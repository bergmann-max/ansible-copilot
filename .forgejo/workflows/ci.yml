name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: arm64
    container: node:${{ matrix.node-version }}-slim
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run lint

  sync-check:
    runs-on: arm64
    container: node:24-slim@sha256:242549cd46785b480c832479a730f4f2a20865d61ea2e404fdb2a5c3d3b73ecf
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/sync.js --check

  smoke:
    runs-on: arm64
    container: node:24-slim@sha256:242549cd46785b480c832479a730f4f2a20865d61ea2e404fdb2a5c3d3b73ecf
    steps:
      - uses: actions/checkout@v4
      - run: node bin/install.js --list --non-interactive --no-color
      - run: node bin/install.js --dry-run --all --non-interactive --no-color
      - run: node bin/install.js --dry-run --only opencode --non-interactive --no-color

  sync-commit:
    if: github.event_name == 'push'
    needs: [lint, sync-check, smoke]
    runs-on: arm64
    container: node:24@sha256:8530f76a96d88820d288761f022e318970dda93d01536919fbc16076b7983e63
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/sync.js
      - name: Commit if changed
        run: |
          git diff --exit-code || (
            git config user.name "tanuki.sh[bot]"
            git config user.email "tanuki.sh@proton.me"
            git add -A
            git commit -m "chore: sync generated files [skip ci]"
            git push
          )
