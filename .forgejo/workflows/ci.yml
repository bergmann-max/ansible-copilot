name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: arm64
    container: node:${{ matrix.node-version }}-slim
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run lint

  sync-check:
    runs-on: arm64
    container: node:22-slim@sha256:e21fc383b50d5347dc7a9f1cae45b8f4e2f0d39f7ade28e4eef7d2934522b752
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/sync.js --check

  smoke:
    runs-on: arm64
    container: node:22-slim@sha256:e21fc383b50d5347dc7a9f1cae45b8f4e2f0d39f7ade28e4eef7d2934522b752
    steps:
      - uses: actions/checkout@v4
      - run: node bin/install.js --list --non-interactive --no-color
      - run: node bin/install.js --dry-run --all --non-interactive --no-color
      - run: node bin/install.js --dry-run --only opencode --non-interactive --no-color

  sync-commit:
    if: github.event_name == 'push'
    needs: [lint, sync-check, smoke]
    runs-on: arm64
    container: node:22@sha256:2d178f2785b96dfbf62a416ca2e40f50e30150b4ff3320d706f0d96e90600eb3
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/sync.js
      - name: Commit if changed
        run: |
          git diff --exit-code || (
            git config user.name "tanuki.sh[bot]"
            git config user.email "tanuki.sh@proton.me"
            git add -A
            git commit -m "chore: sync generated files [skip ci]"
            git push
          )
