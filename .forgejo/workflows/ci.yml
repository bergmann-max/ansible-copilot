name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: arm64
    container: node:${{ matrix.node-version }}-slim
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run lint

  sync-check:
    runs-on: arm64
    container: node:24-slim@sha256:b31e7a42fdf8b8aa5f5ed477c72d694301273f1069c5a2f71d53c6482e99a2fc
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/sync.js --check

  smoke:
    runs-on: arm64
    container: node:24-slim@sha256:b31e7a42fdf8b8aa5f5ed477c72d694301273f1069c5a2f71d53c6482e99a2fc
    steps:
      - uses: actions/checkout@v4
      - run: node bin/install.js --list --non-interactive --no-color
      - run: node bin/install.js --dry-run --all --non-interactive --no-color
      - run: node bin/install.js --dry-run --only opencode --non-interactive --no-color

  sync-commit:
    if: github.event_name == 'push'
    needs: [lint, sync-check, smoke]
    runs-on: arm64
    container: node:24@sha256:fdddfb3e688158251943d52eba361de991548f6814007acba4917ae6b512d6be
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/sync.js
      - name: Commit if changed
        run: |
          git diff --exit-code || (
            git config user.name "tanuki.sh[bot]"
            git config user.email "tanuki.sh@proton.me"
            git add -A
            git commit -m "chore: sync generated files [skip ci]"
            git push
          )
