name: Sync

on:
  push:
    branches: [main]
    paths:
      - "src/agents/opencode/skills/ansible.SKILL.md"
      - "src/rules/ansible-activate.md"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/sync.js
      - name: Commit if changed
        run: |
          git diff --exit-code || (
            git config user.name "tanuki.sh[bot]"
            git config user.email "tanuki.sh@proton.me"
            git add -A
            git commit -m "chore: sync generated files [skip ci]"
            git push
          )
